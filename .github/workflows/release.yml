name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build XPI
        run: |
          cd src
          zip -r ../mdbundle.xpi .

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MdBundle for Zotero v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MdBundle for Zotero v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `mdbundle.xpi` below
            2. In Zotero: **Tools → Add-ons → ⚙️ → Install Add-on From File**
            3. Select the downloaded `.xpi` file

            ### Compatibility
            - Zotero 7, 8, 9

            ### Languages
            🇺🇸 EN | 🇧🇷 PT | 🇪🇸 ES | 🇨🇳 ZH | 🇮🇹 IT | 🇫🇷 FR | 🇩🇪 DE | 🇯🇵 JA | 🇰🇷 KO | 🇷🇺 RU | 🇵🇱 PL | 🇹🇷 TR
          files: mdbundle.xpi
          draft: false
          prerelease: false
